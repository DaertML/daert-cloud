---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-diagnostic-agent
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-diagnostician
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-diagnostic-agent-binding
subjects:
  - kind: ServiceAccount
    name: k8s-diagnostic-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: pod-diagnostician
  apiGroup: rbac.authorization.k8s.io
